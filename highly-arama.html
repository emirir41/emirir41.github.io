<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Highly — Arama</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script async src="https://cse.google.com/cse.js?cx=d31ebc2045edc439f"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--text:#e8e8ff;--muted:#4a4d6a;--nav:rgba(6,7,15,.95);--a1:#6366f1;--a2:#a78bfa;--link:#a78bfa;--link2:#c4b5fd}
[data-theme="glass"]{--bg:linear-gradient(135deg,#0a0f2e,#0d1635);--s1:rgba(255,255,255,.06);--s2:rgba(255,255,255,.1);--border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.2);--text:#f0f4ff;--muted:rgba(255,255,255,.45);--nav:rgba(10,15,46,.8);--a1:#818cf8;--a2:#c4b5fd;--link:#c4b5fd;--link2:#e9d5ff}
[data-theme="light"]{--bg:#f5f6fa;--s1:#fff;--s2:#f0f1f8;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);--text:#1a1b2e;--muted:#9095b0;--nav:rgba(245,246,250,.95);--a1:#6366f1;--a2:#4f46e5;--link:#4f46e5;--link2:#6366f1}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 10%,rgba(99,102,241,.07) 0%,transparent 50%)}
nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:11px 24px;background:var(--nav);border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
.n-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.n-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:15px}
.n-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.n-right{display:flex;align-items:center;gap:8px}
.n-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#fff;text-decoration:none}
.n-btn{color:var(--muted);text-decoration:none;font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:8px;transition:all .2s}
.n-btn:hover{color:var(--text);border-color:var(--border2)}
main{position:relative;z-index:2;max-width:760px;margin:0 auto;padding:32px 20px 80px}
.search-wrap{margin-bottom:24px}
.search-box{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:13px 16px;transition:border-color .2s,box-shadow .2s;margin-bottom:12px}
.search-box:focus-within{border-color:rgba(99,102,241,.4);box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.s-input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none}
.s-input::placeholder{color:var(--muted)}
.s-btn{padding:9px 20px;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .2s}
.s-btn:hover{opacity:.9}
.s-btn:disabled{opacity:.5;cursor:not-allowed}
.tabs{display:flex;gap:4px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:4px;width:fit-content}
.tab{padding:7px 16px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:9px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.active{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff}
.featured{background:var(--s1);border:1px solid rgba(99,102,241,.2);border-left:3px solid var(--a1);border-radius:14px;padding:18px;margin-bottom:20px}
.featured-lbl{font-size:10px;font-weight:700;color:var(--a2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.featured-row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.featured-emoji{font-size:40px;flex-shrink:0}
.featured-main{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:3px}
.featured-desc{font-size:13px;color:var(--muted)}
.featured-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.featured-stat{background:var(--s2);border-radius:10px;padding:10px;text-align:center}
.fs-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
.fs-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.featured-link{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:8px;color:var(--a2);font-size:12px;text-decoration:none;font-weight:600}
.results-meta{font-size:12px;color:var(--muted);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.web-result{padding:16px 0;border-bottom:1px solid var(--border)}
.web-result:last-child{border-bottom:none}
.wr-src{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.wr-domain{font-size:12px;color:var(--muted)}
.wr-title{font-size:17px;font-weight:600;color:var(--link);text-decoration:none;display:block;margin-bottom:4px;line-height:1.4}
.wr-title:hover{color:var(--link2);text-decoration:underline}
.wr-snip{font-size:13px;color:var(--muted);line-height:1.6}
.news-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.ni-img{width:84px;height:62px;border-radius:10px;background:var(--s2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px}
.ni-img img{width:100%;height:100%;object-fit:cover}
.ni-title{font-size:14px;font-weight:600;color:var(--link);text-decoration:none;display:block;margin-bottom:4px;line-height:1.4}
.ni-title:hover{color:var(--link2)}
.ni-meta{font-size:11px;color:var(--muted);margin-bottom:3px}
.ni-snip{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.img-item{aspect-ratio:4/3;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--s2);transition:transform .2s}
.img-item:hover{transform:scale(1.03)}
.img-item img{width:100%;height:100%;object-fit:cover}
.related{margin-top:24px;padding-top:18px;border-top:1px solid var(--border)}
.related-lbl{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;font-weight:700}
.related-chips{display:flex;flex-wrap:wrap;gap:8px}
.rel-chip{padding:7px 14px;background:var(--s1);border:1px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .2s}
.rel-chip:hover{border-color:rgba(99,102,241,.3);color:var(--a2)}
.state{text-align:center;padding:60px 20px;color:var(--muted)}
.state-ico{font-size:48px;margin-bottom:14px;opacity:.5;display:block}
.state-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.state-sub{font-size:13px;line-height:1.6}
.dots{display:flex;justify-content:center;gap:6px;margin-top:20px}
.dots span{width:8px;height:8px;border-radius:50%;background:var(--a1);animation:ld .7s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes ld{0%,60%,100%{transform:scale(.6);opacity:.4}30%{transform:scale(1);opacity:1}}
.quick-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;justify-content:center}
.q-chip{padding:8px 16px;background:var(--s1);border:1px solid var(--border);border-radius:999px;font-size:13px;cursor:pointer;color:var(--muted);transition:all .2s}
.q-chip:hover{border-color:rgba(99,102,241,.3);color:var(--a2)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);padding:16px}
.modal.open{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;max-width:680px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-head-title{flex:1;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-close{width:30px;height:30px;background:var(--s2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.modal-img{display:flex;align-items:center;justify-content:center;background:#000;max-height:380px;overflow:hidden}
.modal-img img{max-width:100%;max-height:380px;object-fit:contain}
.modal-src{padding:8px 18px;font-size:11px;color:var(--muted)}
.modal-btns{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.m-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;cursor:pointer;text-decoration:none;transition:all .2s;font-family:'DM Sans',sans-serif;font-weight:500}
.m-btn-p{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border:none}
.m-btn-s{background:var(--s2);border:1px solid var(--border);color:var(--text)}
.m-btn-s:hover{border-color:var(--border2)}
@media(max-width:480px){.s-btn{padding:9px 14px;font-size:12px}.featured-grid{grid-template-columns:repeat(2,1fr)}}
/* Hide Google CSE native UI — we use only its data */
#gcse-hidden-container{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none}
</style>
</head>
<body>

<div class="modal" id="imgModal" onclick="modalBg(event)">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-head-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>

    <div class="modal-img"><img id="modalImg" src="" alt=""/></div>

    <div class="modal-btns">
      <a class="m-btn m-btn-p" id="modalDl" href="#" download target="_blank">&#11015; Indir</a>
      <a class="m-btn m-btn-s" id="modalSrcBtn" href="#" target="_blank">&#128279; Kaynaga Git</a>
    </div>
  </div>
</div>

<nav>
  <a href="dashboard.html" class="n-logo">
    <div class="n-icon">&#128269;</div>
    <span class="n-title">Arama</span>
  </a>
  <div class="n-right">
    <a href="highly-profil.html" class="n-avatar" id="navAv">?</a>
    <a href="dashboard.html" class="n-btn">&#8962; Dashboard</a>
  </div>
</nav>

<!-- Google CSE gizli konteyner - yalnizca API icin kullanilir -->
<div id="gcse-hidden-container">
  <div class="gcse-search" id="gcseWidget" data-resultsUrl="javascript:void(0)" data-newWindow="false" data-queryParameterName="q"></div>
</div>

<main>
  <div class="search-wrap">
    <div class="search-box">
      <input class="s-input" id="sInput" placeholder="Ne aramak istiyorsun?" autofocus/>
      <button class="s-btn" id="sBtn">Ara</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-type="search">&#127760; Web</button>
      <button class="tab" data-type="news">&#128240; Haberler</button>
      <button class="tab" data-type="images">&#128444; Gorseller</button>
    </div>
  </div>
  <div id="area">
    <div class="state">
      <span class="state-ico">&#128269;</span>
      <div class="state-title">Highly Arama</div>
      <div class="state-sub">Web, haberler ve gorsellerde ara.</div>
      <div class="quick-chips">
        <div class="q-chip" onclick="qs('haberler')">Haberler</div>
        <div class="q-chip" onclick="qs('hava durumu')">Hava</div>
        <div class="q-chip" onclick="qs('dolar kuru')">Doviz</div>
        <div class="q-chip" onclick="qs('teknoloji')">Teknoloji</div>
        <div class="q-chip" onclick="qs('spor')">Spor</div>
      </div>
    </div>
  </div>
</main>

<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('highly_theme') || 'dark');

var sv = localStorage.getItem('highly_user');
if (!sv) location.href = 'highly-id.html';
var usr = JSON.parse(sv || '{}');
var av = document.getElementById('navAv');
if (usr.avatarEmoji) { av.textContent = usr.avatarEmoji; av.style.background = 'transparent'; av.style.fontSize = '16px'; }
else { av.textContent = (usr.name || '?')[0].toUpperCase(); if (usr.avatarBg) av.style.background = usr.avatarBg; }

var GCSE_CX = 'd31ebc2045edc439f';
var activeType = 'search';

document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
    t.classList.add('active');
    activeType = t.dataset.type;
    var q = document.getElementById('sInput').value.trim();
    if (q) run(q);
  });
});
document.getElementById('sBtn').addEventListener('click', function() {
  var q = document.getElementById('sInput').value.trim();
  if (q) run(q);
});
document.getElementById('sInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { var q = this.value.trim(); if (q) run(q); }
});
function qs(q) { document.getElementById('sInput').value = q; run(q); }

function loading() {
  document.getElementById('area').innerHTML =
    '<div class="state"><span class="state-ico">&#128269;</span><div class="state-title">Araniyor...</div>' +
    '<div class="dots"><span></span><span></span><span></span></div></div>';
}

// Google CSE'den sonuc cekme (callback API)
function gcseSearch(q, start) {
  start = start || 1;
  return new Promise(function(resolve, reject) {
    var cbName = '__gcse_cb_' + Date.now();
    var timer = setTimeout(function() {
      delete window[cbName];
      reject(new Error('timeout'));
    }, 10000);
    window[cbName] = function(data) {
      clearTimeout(timer);
      delete window[cbName];
      resolve(data);
    };
    var url = 'https://www.googleapis.com/customsearch/v1?cx=' + GCSE_CX +
      '&q=' + encodeURIComponent(q) +
      '&start=' + start +
      '&num=10&hl=tr&gl=tr&callback=' + cbName;
    var s = document.createElement('script');
    s.src = url;
    s.onerror = function() {
      clearTimeout(timer);
      delete window[cbName];
      // API key gerekli, GCSE widget'a yonlendir
      resolve({ _noApiKey: true });
    };
    document.head.appendChild(s);
    setTimeout(function() { s.remove(); }, 12000);
  });
}

async function run(q) {
  loading();
  document.getElementById('sBtn').disabled = true;
  try {
    if (activeType === 'search') {
      // Snippet ve Google arama paralel calis
      var featured = null;
      var gcsePromise = gcseSearch(q);
      try { featured = await getSnippet(q); } catch(e) {}
      var gcseData = await gcsePromise;
      if (gcseData._noApiKey) {
        // API key yok: Google CSE widget'i goster
        renderGCSEWidget(q, featured);
      } else {
        renderWeb(gcseData, featured);
      }
    } else if (activeType === 'images') {
      var gcseData = await gcseSearch(q + ' -site:adult.com', 1);
      if (gcseData._noApiKey) {
        renderGCSEWidget(q, null, 'images');
      } else {
        renderGCSEImages(gcseData);
      }
    } else if (activeType === 'news') {
      renderGCSEWidget(q, null, 'news');
    }
  } catch(e) {
    document.getElementById('area').innerHTML =
      '<div class="state"><span class="state-ico">&#10060;</span><div class="state-title">Baglanti hatasi</div><div class="state-sub">' + (e.message||'') + '</div></div>';
  }
  document.getElementById('sBtn').disabled = false;
}

// API key yoksa Google CSE widget'i styled olarak goster
function renderGCSEWidget(q, featured, type) {
  var html = (featured || '');
  html += '<div id="gcse-inline-wrap" style="margin-top:8px"></div>';
  document.getElementById('area').innerHTML = html;
  // Inline GCSE widget olustur
  var wrap = document.getElementById('gcse-inline-wrap');
  var typeAttr = type === 'images' ? 'gcse-searchresults-only' : (type === 'news' ? 'gcse-searchresults-only' : 'gcse-searchresults-only');
  wrap.innerHTML = '<div class="gcse-searchresults-only" data-queryParameterName="q" data-defaultToImageSearch="' + (type==='images'?'true':'false') + '"></div>';
  if (window.google && window.google.search && window.google.search.cse) {
    window.google.search.cse.element.render({ div: wrap.firstChild, tag: 'searchresults-only', gname: 'inline_' + Date.now() });
    setTimeout(function() {
      if (window.google && window.google.search.cse.element.getElement) {
        try {
          var el = window.google.search.cse.element.getElement('inline_' + Date.now());
          if (el) el.execute(q);
        } catch(e2) {}
      }
    }, 300);
  }
  // En guvenilir yol: GCSE'ye yonlendir
  wrap.innerHTML = '<div style="padding:20px 0;text-align:center;color:var(--muted);font-size:13px">' +
    'Google CSE API anahtari gerekli. ' +
    '<a href="https://cse.google.com/cse?cx=' + GCSE_CX + '&q=' + encodeURIComponent(q) + '" target="_blank" style="color:var(--a2)">Google\'da ara &rarr;</a>' +
    '</div>';
}

// Google CSE gorsel sonuclari
function renderGCSEImages(data) {
  var items = (data.items || []).filter(function(r) { return r.pagemap && r.pagemap.cse_image; });
  if (!items.length) { empty(); return; }
  var html = '<div class="results-meta">' + (data.searchInformation ? Number(data.searchInformation.totalResults).toLocaleString('tr-TR') + ' gorsel &middot; Google' : items.length + ' gorsel') + '</div><div class="img-grid">';
  items.forEach(function(r) {
    var src = (r.pagemap.cse_image[0] || {}).src || '';
    var title = (r.title || '').replace(/"/g,'').replace(/'/g,'');
    var link = r.link || src;
    var domain = r.displayLink || '';
    if (!src) return;
    html += '<div class="img-item" onclick="openModal(' +
      JSON.stringify(src) + ',' + JSON.stringify(title) + ',' + JSON.stringify(link) + ',' + JSON.stringify(domain) +
      ')"><img src="' + src + '" alt="" loading="lazy" onerror="this.parentElement.style.display=\'none\'"/></div>';
  });
  html += '</div>';
  document.getElementById('area').innerHTML = html;
}

// Featured snippet
var WI = {'01d':'&#9728;','01n':'&#127769;','02d':'&#9925;','02n':'&#9925;','03d':'&#9729;','03n':'&#9729;','04d':'&#9729;','04n':'&#9729;','09d':'&#127783;','09n':'&#127783;','10d':'&#127782;','10n':'&#127782;','11d':'&#9928;','11n':'&#9928;','13d':'&#10052;','13n':'&#10052;','50d':'&#127787;','50n':'&#127787;'};

function isHava(q) { return /hava|derece|sicaklik/i.test(q); }
function isDoviz(q) { return /dolar|euro|sterlin|doviz|kur|frank/i.test(q); }

async function getSnippet(q) {
  try {
    if (isHava(q))  return await havaSnippet();
    if (isDoviz(q)) return await dovizSnippet(q);
  } catch(e) {}
  return null;
}

async function havaSnippet() {
  var geo = await (await fetch('https://ipapi.co/json/')).json();
  var url = 'https://api.openweathermap.org/data/2.5/weather?lat=' + geo.latitude + '&lon=' + geo.longitude + '&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr';
  var d = await (await fetch(url)).json();
  if (!d || d.cod !== 200) return null;
  var icon = WI[d.weather[0].icon] || '&#127780;';
  return '<div class="featured">' +
    '<div class="featured-lbl">&#9889; Highly Hava - ' + d.name + '</div>' +
    '<div class="featured-row"><div class="featured-emoji">' + icon + '</div>' +
    '<div><div class="featured-main">' + Math.round(d.main.temp) + '&#176;C</div>' +
    '<div class="featured-desc">' + d.weather[0].description + ' &middot; Hissedilen: ' + Math.round(d.main.feels_like) + '&#176;C</div>' +
    '</div></div>' +
    '<div class="featured-grid">' +
    '<div class="featured-stat"><div class="fs-val">%' + d.main.humidity + '</div><div class="fs-lbl">Nem</div></div>' +
    '<div class="featured-stat"><div class="fs-val">' + Math.round(d.wind.speed * 3.6) + '</div><div class="fs-lbl">km/s</div></div>' +
    '<div class="featured-stat"><div class="fs-val">' + Math.round(d.main.temp_min) + '&#176;</div><div class="fs-lbl">Min</div></div>' +
    '<div class="featured-stat"><div class="fs-val">' + Math.round(d.main.temp_max) + '&#176;</div><div class="fs-lbl">Max</div></div>' +
    '</div>' +
    '<a href="highly-hava.html" class="featured-link">&#127780; Hava sayfasini ac</a></div>';
}

async function dovizSnippet(q) {
  var data = await (await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY,EUR,GBP')).json();
  var TRY = data.rates.TRY;
  var EUR = (TRY / data.rates.EUR).toFixed(2);
  var GBP = (TRY / data.rates.GBP).toFixed(2);
  var saat = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Istanbul' });
  var main = TRY.toFixed(2) + ' TL';
  var lbl = '1 Dolar';
  if (/euro/i.test(q)) { main = EUR + ' TL'; lbl = '1 Euro'; }
  else if (/sterlin/i.test(q)) { main = GBP + ' TL'; lbl = '1 Sterlin'; }
  return '<div class="featured">' +
    '<div class="featured-lbl">&#9889; Highly Doviz &middot; ' + saat + '</div>' +
    '<div class="featured-row"><div class="featured-emoji">&#128181;</div>' +
    '<div><div class="featured-main">' + main + '</div>' +
    '<div class="featured-desc">' + lbl + ' = ' + main + '</div></div></div>' +
    '<div class="featured-grid">' +
    '<div class="featured-stat"><div class="fs-val">' + TRY.toFixed(2) + '</div><div class="fs-lbl">Dolar</div></div>' +
    '<div class="featured-stat"><div class="fs-val">' + EUR + '</div><div class="fs-lbl">Euro</div></div>' +
    '<div class="featured-stat"><div class="fs-val">' + GBP + '</div><div class="fs-lbl">Sterlin</div></div>' +
    '</div>' +
    '<a href="highly-doviz.html" class="featured-link">&#128181; Doviz sayfasini ac</a></div>';
}

function renderWeb(data, featured) {
  var results = data.items || [];
  var related = [];
  if (!results.length && !featured) { empty(); return; }
  var html = '';
  if (featured) html += featured;
  html += '<div class="results-meta">';
  if (data.searchInformation && data.searchInformation.totalResults) {
    html += Number(data.searchInformation.totalResults).toLocaleString('tr-TR') + ' sonuc &middot; Google';
  } else {
    html += results.length + ' sonuc bulundu';
  }
  html += '</div>';
  results.forEach(function(r) {
    var domain = r.displayLink || '';
    if (!domain) { try { domain = new URL(r.link).hostname.replace('www.',''); } catch(e){} }
    var favicon = 'https://www.google.com/s2/favicons?sz=16&domain=' + domain;
    html += '<div class="web-result">' +
      '<div class="wr-src"><img src="' + favicon + '" width="14" height="14" style="border-radius:3px;vertical-align:middle" onerror="this.style.display=\'none\'"/>' +
      '<span class="wr-domain">' + domain + '</span></div>' +
      '<a href="' + r.link + '" target="_blank" class="wr-title">' + (r.title||'') + '</a>' +
      '<div class="wr-snip">' + (r.snippet||'') + '</div></div>';
  });
  document.getElementById('area').innerHTML = html;
}

function empty() {
  document.getElementById('area').innerHTML =
    '<div class="state"><span class="state-ico">&#129335;</span><div class="state-title">Sonuc bulunamadi</div></div>';
}

// Gorsel modal
function openModal(src, title, link, domain) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modalTitle').textContent = title || 'Gorsel';
  document.getElementById('modalSrc').textContent = domain ? 'Kaynak: ' + domain : '';
  document.getElementById('modalDl').href = src;
  document.getElementById('modalSrcBtn').href = link;
  document.getElementById('imgModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('imgModal').classList.remove('open');
  document.getElementById('modalImg').src = '';
  document.body.style.overflow = '';
}
function modalBg(e) { if (e.target === document.getElementById('imgModal')) closeModal(); }
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
</script>
