<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Highly Harita</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1842711344931829" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080f;--s1:#0c0f1e;--border:rgba(255,255,255,0.08);--accent:#34d399;--accent2:#818cf8;--accent3:#f59e0b;--text:#e8f0ff;--muted:#4a5068}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
#map{position:fixed;inset:0;z-index:0}
.leaflet-tile{filter:brightness(0.75) saturate(0.7) hue-rotate(180deg) invert(1)}
.leaflet-container{background:var(--bg)}
.leaflet-control-zoom{border:1px solid var(--border)!important;border-radius:12px!important;overflow:hidden;margin-bottom:80px!important}
.leaflet-control-zoom a{background:rgba(12,15,30,.95)!important;color:var(--text)!important;border-color:var(--border)!important}
/* Top bar */
.top-left{position:fixed;top:16px;left:16px;z-index:1000}
.logo-badge{display:flex;align-items:center;gap:8px;background:rgba(12,15,30,.92);border:1px solid var(--border);border-radius:12px;padding:8px 14px;backdrop-filter:blur(20px);text-decoration:none;color:var(--text)}
.logo-icon{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#fff}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}
.top-right{position:fixed;top:16px;right:16px;z-index:1000;display:flex;align-items:center;gap:10px}
.back-btn{background:rgba(12,15,30,.92);border:1px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--muted);text-decoration:none;font-size:13px;backdrop-filter:blur(20px)}
.avatar-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.15)}
/* Map style buttons */
.map-style-btns{position:fixed;left:16px;bottom:90px;z-index:400;display:flex;flex-direction:column;gap:6px}
.msb{width:40px;height:40px;border-radius:12px;background:rgba(12,15,30,.92);border:1px solid var(--border);color:var(--muted);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(20px);transition:all .2s}
.msb.active,.msb:hover{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.35);color:var(--accent)}
/* Bottom info bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:500;background:rgba(12,15,30,.97);border-top:1px solid var(--border);backdrop-filter:blur(30px);padding:14px 16px 20px;display:flex;align-items:center;justify-content:space-between}
.bb-text{font-size:12px;color:var(--muted)}
.bb-count{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--accent)}
/* Stop popup / bottom sheet */
.stop-sheet{position:fixed;bottom:0;left:0;right:0;z-index:600;background:rgba(8,10,22,.99);border-radius:20px 20px 0 0;border-top:1px solid var(--border);backdrop-filter:blur(30px);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:75vh;display:flex;flex-direction:column}
.stop-sheet.open{transform:translateY(0)}
.ss-handle{width:40px;height:4px;border-radius:2px;background:var(--muted);margin:12px auto 0;flex-shrink:0}
.ss-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ss-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;line-height:1.2}
.ss-sub{font-size:11px;color:var(--muted);margin-top:3px}
.ss-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ss-body{overflow-y:auto;padding:8px 16px 32px;flex:1}
/* Bus list */
.bus-loading{text-align:center;padding:24px;color:var(--muted);font-size:13px}
.bus-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.bus-item:last-child{border-bottom:none}
.bus-badge{min-width:48px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;flex-shrink:0;background:rgba(52,211,153,.15);color:var(--accent);border:1px solid rgba(52,211,153,.25)}
.bus-info{flex:1;min-width:0}
.bus-dest{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.bus-time-badge{flex-shrink:0;text-align:right}
.bus-eta{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}
.bus-eta.soon{color:var(--accent)}
.bus-eta.medium{color:var(--accent3)}
.bus-eta.later{color:var(--muted)}
.bus-eta-label{font-size:10px;color:var(--muted);margin-top:1px;text-align:right}
.no-buses{text-align:center;padding:28px 16px;color:var(--muted);font-size:13px}
.api-error{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:12px;text-align:center;color:#f87171;font-size:12px;margin:8px 0}
.refresh-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 14px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);border-radius:8px;color:var(--accent);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
/* Toast */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;opacity:0;z-index:9998;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--accent);color:var(--accent)}
/* Warning modal */
.warning-modal{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);backdrop-filter:blur(10px)}
.warning-box{background:var(--s1);border:1px solid rgba(129,140,248,.3);border-radius:20px;padding:28px;max-width:340px;width:90%;text-align:center}
.warning-ok{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#000;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px}
</style>
</head>

  </div>
  <div class="ss-body" id="ssBody">

</div>

<!-- Uyari -->
<div class="warning-modal" id="warningModal">

      Herhangi bir duraga tikla, o duraga<br>
      kac dakika sonra hangi otobus gelecegini gor.
    </div>
    <button class="warning-ok" onclick="closeWarning()">Haritayi Ac &#8594;</button>
  </div>
</div>

<div class="toast" id="toast"></div>

// API base - Kocaeli Buyuksehir Belediyesi open data
// Kocaeli BB acik veri portali
// ekran bilgileri (gercek zamanli, tercihli)
const API_SCREEN = '/api/OpenData/c7b7c933-7913-4483-937d-4760f7e5e29b';
// durak bilgileri (fallback)
const API_STOP   = '/api/OpenData/a9604fe2-c723-41fd-bf74-6cea8af16a54';
// Base URL deneme listesi - hangisi cevap verirse onu kullan

  'https://akillisehirapi.kocaeli.bel.tr'

function locateMe() {
  if (!navigator.geolocation) return showToast('Konum desteklenmiyor', false);
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 16);

// Durak ikonlari

// Duragi haritaya ekle
let activeMarker = null;
SMART_STOPS.forEach(stop => {
  const m = L.marker([stop.lat, stop.lon], { icon: stopIcon }).addTo(map);
  m.on('click', () => openStop(stop, m));
});

// Durak sheet ac
let currentStopId = null;
function openStop(stop, marker) {
  if (activeMarker) activeMarker.setIcon(stopIcon);
  activeMarker = marker;
  marker.setIcon(stopIconHover);
  currentStopId = stop.id;
  document.getElementById('ssTitle').textContent = stop.name;
  document.getElementById('ssSub').textContent = stop.ilce + ' — Durak #' + stop.id;
  document.getElementById('ssBody').innerHTML = '<div class="bus-loading">&#128652; Otobus bilgileri yukleniyor...</div>';
  document.getElementById('stopSheet').classList.add('open');
  fetchBuses(stop.id);
}

function closeSheet() {
  document.getElementById('stopSheet').classList.remove('open');
  if (activeMarker) { activeMarker.setIcon(stopIcon); activeMarker = null; }
  currentStopId = null;
}

// API'den otobüs bilgisi çek
async function fetchBuses(stopId) {
  const body = document.getElementById('ssBody');
  try {
    // Ekran API - durak ID filtresi ile
    // Tum base URL + endpoint kombinasyonlarini sirayla dene
    const combos = [];
    for (const base of API_BASES) {
      combos.push(base + API_SCREEN + '?DurakId=' + stopId);
      combos.push(base + API_STOP   + '?DurakId=' + stopId);
    }
    let lastErr = null;
    for (const url of combos) {
      try {
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (!res.ok) { lastErr = 'HTTP ' + res.status; continue; }
        const data = await res.json();
        renderBuses(body, data, stopId);
        return;
      } catch (e) { lastErr = e.message; }
    }
    // Hicbiri calismadi
    body.innerHTML = `
      <div class="api-error">
        <div style="font-size:22px;margin-bottom:6px">&#128531;</div>
        <div>Sunucuya baglanilamadi</div>
        <div style="margin-top:4px;font-size:11px;color:#9ca3af">${lastErr||''}</div>
        <div style="margin-top:6px;font-size:11px;color:#6b7280">API: veri.kocaeli.bel.tr</div>
        <button class="refresh-btn" onclick="fetchBuses('${stopId}')">&#8635; Tekrar Dene</button>
      </div>`;
  }
}

// Otobüsleri render et
function renderBuses(body, data, stopId) {
  // API yanit formatini normalize et
  let buses = [];
  if (Array.isArray(data)) buses = data;
  else if (data && Array.isArray(data.value)) buses = data.value;
  else if (data && Array.isArray(data.data)) buses = data.data;
  else if (data && Array.isArray(data.result)) buses = data.result;

  if (!buses.length) {
    body.innerHTML = `
      <div class="no-buses">
        <div style="font-size:28px;margin-bottom:8px">&#128683;</div>
        <div>Sirada bekleyen otobus yok</div>
        <div style="font-size:11px;margin-top:4px">ya da bu durak aktif degil</div>
        <button class="refresh-btn" onclick="fetchBuses('${stopId}')">&#8635; Yenile</button>
      </div>`;
    return;
  }

  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();

  const html = buses.slice(0, 12).map(b => {
    // Alan isimlerini normalize et (API'nin donebilecegi farkli isimler)
    const lineNo   = b.HatNo || b.hatNo || b.LineNo || b.lineNo || b.RouteShortName || b.Hat || '—';
    const dest     = b.GuzergahAdi || b.guzergahAdi || b.Hedef || b.hedef || b.Destination || b.TripHeadsign || '';
    const arrStr   = b.TahminiVaris || b.tahminiVaris || b.ArrivalTime || b.Saat || b.GelisSaati || '';
    const minLeft  = b.KalanDakika || b.kalanDakika || b.MinutesLeft || null;

    let etaHtml = '';

    if (minLeft !== null && minLeft !== undefined) {
      // Direkt kalan dakika var
      const mins = parseInt(minLeft);
      if (mins <= 60) {
        const cls = mins <= 5 ? 'soon' : mins <= 20 ? 'medium' : 'later';
        etaHtml = `<div class="bus-eta ${cls}">${mins} dk</div><div class="bus-eta-label">sonra</div>`;
      } else {
        // 60dk'dan fazla - saat yaz
        const eta = arrStr || minsToTime(nowMin + mins);
        etaHtml = `<div class="bus-eta later">${eta}</div><div class="bus-eta-label">gelis saati</div>`;
      }
    } else if (arrStr) {
      // Saat string var - kalan dakikayı hesapla
      const arrMin = timeToMins(arrStr);
      if (arrMin !== null) {
        let diff = arrMin - nowMin;
        if (diff < -60) diff += 1440; // gece yarisi gecer
        if (diff < 0) diff = 0;

        if (diff <= 60) {
          const cls = diff <= 5 ? 'soon' : diff <= 20 ? 'medium' : 'later';
          const label = diff <= 1 ? 'geliyor' : diff + ' dk sonra';
          etaHtml = `<div class="bus-eta ${cls}">${diff <= 1 ? '&#10004;' : diff + ' dk'}</div><div class="bus-eta-label">${diff <= 1 ? 'geliyor' : 'sonra'}</div>`;
        } else {
          // 60dk geciyor - sadece saati yaz
          etaHtml = `<div class="bus-eta later">${arrStr.substring(0,5)}</div><div class="bus-eta-label">gelis saati</div>`;
        }
      } else {
        etaHtml = `<div class="bus-eta medium">${arrStr.substring(0,5)}</div><div class="bus-eta-label">gelis saati</div>`;
      }
    } else {
      etaHtml = `<div class="bus-eta later">—</div>`;
    }

    return `<div class="bus-item">
      <div class="bus-badge">${lineNo}</div>
      <div class="bus-info">
        <div class="bus-dest">${dest || 'Guzergah bilgisi yok'}</div>
      </div>
      <div class="bus-time-badge">${etaHtml}</div>
    </div>`;
  }).join('');

  const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  body.innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin:6px 0 10px;display:flex;justify-content:space-between;align-items:center">
      <span>${buses.length} otobus bilgisi</span>
      <span>${ts} itibariyle &nbsp;<button onclick="fetchBuses('${stopId}')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:11px;padding:0">&#8635; Yenile</button></span>
    </div>
    ${html}`;
}

// Zaman yardimci fonksiyonlari
function timeToMins(str) {
  if (!str) return null;
  const clean = str.toString().trim().substring(0, 5);
  const parts = clean.split(':');
  if (parts.length < 2) return null;
  const h = parseInt(parts[0]), m = parseInt(parts[1]);
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}
function minsToTime(totalMins) {
  const h = Math.floor((totalMins % 1440) / 60);
  const m = totalMins % 60;
  return h.toString().padStart(2,'0') + ':' + m.toString().padStart(2,'0');
}

// Toast
function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (ok ? ' ok' : '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Harita tiklamasi sheet'i kapat
map.on('click', () => { if (currentStopId) closeSheet(); });
</script>
